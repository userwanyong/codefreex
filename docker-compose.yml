# CodeFreex 基础设施环境 Docker Compose 部署配置
# 使用方式: docker compose up -d [服务名]
# 包含: MySQL、Redis、Nacos、Auth 认证授权服务、Prometheus、Grafana
#
# 服务说明:
#   - MySQL:         localhost:3306 (root/123456)
#   - Redis:         localhost:6379
#   - Nacos 控制台:   http://localhost:8080/nacos (nacos/nacos)
#   - Auth Service:  http://localhost:8123
#   - Prometheus:    http://localhost:9090
#   - Grafana:       http://localhost:3000 (admin/admin)

services:
  # ==================== 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: codefreex-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docs/sql/init.sql:/docker-entrypoint-initdb.d/01-codefreex.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codefreex-network

  # ==================== 缓存 & 会话 ====================
  redis:
    image: redis:7-alpine
    container_name: codefreex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass 123456 --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codefreex-network

  # ==================== 注册中心 ====================
  nacos:
    image: nacos/nacos-server
    container_name: codefreex-nacos
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      - PREFER_HOST_MODE=hostname
      - MODE=standalone
      - NACOS_AUTH_IDENTITY_KEY=2222
      - NACOS_AUTH_IDENTITY_VALUE=2xxx
      - NACOS_AUTH_TOKEN=SecretKey012345678901234567890123456789012345678901234567890123456789
    logging:
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - codefreex-network

  # ==================== 认证授权服务 ====================
  auth-service:
    image: registry.cn-wulanchabu.aliyuncs.com/wanyj/auth-service:3.2
    container_name: codefreex-auth-service
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      # Database Configuration
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auth_service?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      # Redis Configuration
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: 123456
      # Nacos Configuration
      dubbo.registry.address: nacos://nacos:8848
      dubbo.registry.username: nacos
      dubbo.registry.password: nacos
      dubbo.metadata-report.address: nacos://nacos:8848
      dubbo.metadata-report.username: nacos
      dubbo.metadata-report.password: nacos
      DUBBO_IP_TO_REGISTRY: 127.0.0.1
      # JVM Configuration
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+PrintGCDetails
        -XX:+PrintGCTimeStamps
        -Xlog:gc*:file=/logs/gc.log:time,tags:filecount=10,filesize=100M
    ports:
      - "8123:8123"   # REST API
      - "20880:20880" # Dubbo RPC
    volumes:
      - auth-logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    networks:
      - codefreex-network

  # ==================== 监控 ====================
  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: codefreex-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docs/grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - codefreex-network

  grafana:
    image: grafana/grafana:11.6.0
    container_name: codefreex-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/codefreex-ai-monitoring.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docs/grafana/codefreex-ai-monitoring.json:/var/lib/grafana/dashboards/codefreex-ai-monitoring.json:ro
      - ./docs/grafana/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./docs/grafana/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
    depends_on:
      - prometheus
    networks:
      - codefreex-network

# ==================== 数据持久化 ====================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  auth-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# ==================== 网络 ====================
networks:
  codefreex-network:
    driver: bridge
