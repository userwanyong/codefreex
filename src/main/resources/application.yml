spring:
  application:
    name: codefreex
  profiles:
    active: local
  session:
    store-type: redis
    timeout: 1800
  devtools:
    restart:
      enabled: false
server:
  port: 8123
  servlet:
    context-path: /api
# MyBatis-Flex
mybatis-flex:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    logic-delete-column: is_delete
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: cn.wanyj.codefreex.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
# Dubbo RPC
dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  consumer:
    timeout: 5000
    check: false
# LangChain4j OpenAI 配置（主生成模型 - 流式，敏感信息在 application-local.yml 中配置）
langchain4j:
  open-ai:
    streaming-chat-model:
      temperature: 0.7
      max-tokens: 163840
      log-requests: false
      log-responses: false
# AI 自定义配置
ai:
  review:
    temperature: 0.3
    max-tokens: 2048
  prompts-dir: classpath:prompts/
app:
  nginx:
    enabled: false
    reload-on-deploy: false
    server-name-suffix: .local
  screenshot:
    enabled: true
    browser: edge
    page-load-timeout-seconds: 20
    render-wait-millis: 1500
